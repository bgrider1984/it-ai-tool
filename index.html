<!DOCTYPE html>
<html>
<head>
    <title>IT Copilot</title>
    <style>
        body {
            font-family: Arial;
            background: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #4fc3f7;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #1e1e1e;
            color: white;
            border: 1px solid #333;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            background: #4fc3f7;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .box {
            margin-top: 20px;
            background: #1e1e1e;
            padding: 15px;
            border-left: 4px solid #4fc3f7;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>IT Copilot</h1>

<textarea id="input" placeholder="Describe the IT issue..."></textarea><br>

<button onclick="ask()">Analyze Issue</button>

<div id="output"></div>

<script>
async function ask() {
    const message = document.getElementById("input").value;

    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
    });

    const data = await res.json();

    document.getElementById("output").innerHTML =
        `<div class="box">${data.response}</div>`;
}
</script>

</body>
</html>
