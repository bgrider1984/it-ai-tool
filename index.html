<!DOCTYPE html>
<html>
<head>
    <title>IT Troubleshooting Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            background: #111827;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        #chat {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 75%;
            white-space: pre-wrap;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #1f2937;
        }

        .meta {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #22c55e;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .thinking {
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<header>🛠 IT Troubleshooting Assistant</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Type your issue..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
let chatHistory = JSON.parse(localStorage.getItem("chat") || "[]");

window.onload = function() {
    chatHistory.forEach(renderMessage);
};

async function sendMessage() {
    const input = document.getElementById("msg");
    const text = input.value;
    if (!text) return;

    input.value = "";

    const userMsg = { role: "user", text };
    chatHistory.push(userMsg);
    save();
    renderMessage(userMsg);

    // Thinking indicator
    const thinkingId = "thinking-" + Date.now();
    addThinking(thinkingId);

    const res = await fetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    removeThinking(thinkingId);

    const botMsg = {
        role: "bot",
        text: data.response,
        tokens: data.tokens,
        cost: data.cost
    };

    chatHistory.push(botMsg);
    save();
    renderMessage(botMsg);
}

function renderMessage(msg) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg " + (msg.role === "user" ? "user" : "bot");

    div.innerText = msg.text;

    // show metadata for bot
    if (msg.role === "bot") {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerText = `Tokens: ${msg.tokens || "?"} | Cost: $${msg.cost || "?"}`;
        div.appendChild(meta);
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addThinking(id) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg bot thinking";
    div.id = id;
    div.innerText = "Thinking...";

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function save() {
    localStorage.setItem("chat", JSON.stringify(chatHistory));
}
</script>

</body>
</html>
