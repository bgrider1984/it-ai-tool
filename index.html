<!DOCTYPE html>
<html>
<head>
    <title>IT Troubleshooting Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            background: #111827;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }

        #chat {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 70%;
            white-space: pre-wrap;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #1f2937;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #22c55e;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<header>🛠 IT Troubleshooting Assistant</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Type your issue..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    const input = document.getElementById("msg");
    const text = input.value;
    if (!text) return;

    addMessage("user", text);
    input.value = "";

    const res = await fetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    });

    const data = await res.json();
    addMessage("bot", data.response);
}

function addMessage(type, text) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
