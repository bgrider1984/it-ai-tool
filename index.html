<!DOCTYPE html>
<html>
<head>
    <title>IT Troubleshooting Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            background: #111827;
            text-align: center;
            font-weight: bold;
        }

        #chat {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 75%;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #1f2937;
        }

        button.option {
            display: block;
            margin: 5px 0;
            padding: 8px;
            background: #374151;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button.option:hover {
            background: #4b5563;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button.send {
            margin-left: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>🛠 IT Troubleshooting Assistant</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="Type your issue..." />
    <button class="send" onclick="sendMessage()">Send</button>
</div>

<script>
let chatHistory = [];

async function sendMessage(textOverride=null) {
    const input = document.getElementById("msg");
    const text = textOverride || input.value;

    if (!text) return;

    input.value = "";

    addMessage("user", text);

    chatHistory.push({
        role: "user",
        content: text
    });

    const res = await fetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ history: chatHistory })
    });

    const data = await res.json();

    addMessage("bot", data.response);

    chatHistory.push({
        role: "assistant",
        content: data.response
    });

    if (data.options && data.options.length > 0) {
        renderOptions(data.options);
    }
}

function addMessage(role, text) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function renderOptions(options) {
    const chat = document.getElementById("chat");

    const container = document.createElement("div");

    options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;

        btn.onclick = () => {
            sendMessage(opt);
        };

        container.appendChild(btn);
    });

    chat.appendChild(container);
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
