<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

#chat {
    height:70vh;
    overflow-y:auto;
    background:#111827;
    padding:15px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
}

.msg {
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    max-width:90%;
    white-space:pre-wrap;
}

.user {
    background:#2563eb;
    align-self:flex-end;
}

.bot {
    background:#374151;
    align-self:flex-start;
}

.step {
    margin-top:10px;
    padding:10px;
    background:#1f2937;
    border-radius:8px;
}

.inputArea {
    display:flex;
    gap:10px;
    margin-top:10px;
}

input {
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
}
</style>
</head>

<body>

<div class="container">
<h2>IT Copilot</h2>

<div id="chat"></div>

<div class="inputArea">
<input id="input" placeholder="Describe issue..." />
<button onclick="send()">Send</button>
</div>
</div>

<script>

let sessionId = localStorage.getItem("sessionId");

const chat = document.getElementById("chat");
const input = document.getElementById("input");

input.addEventListener("keydown", e => {
    if(e.key === "Enter") send();
});

function renderBot(data){

    const div = document.createElement("div");
    div.className = "msg bot";

    let parsed;

    try {
        parsed = JSON.parse(data.response);
    } catch {
        div.textContent = data.response;
        chat.appendChild(div);
        return;
    }

    div.innerHTML = `
        <b>Issue:</b> ${parsed.issue_summary}<br>
        <b>Cause:</b> ${parsed.likely_cause}<br>
        <b>Confidence:</b> ${parsed.confidence}<br><br>
        <b>START HERE:</b>
    `;

    parsed.steps.forEach((step, i) => {

        const s = document.createElement("div");
        s.className = "step";

        s.innerHTML = `
            <b>${step.title}</b><br><br>
            <b>Instructions:</b><br>
            ${step.instructions.join("<br>")}<br><br>
            <b>Expected:</b> ${step.expected}<br>
            <b>If it fails:</b> ${step.if_failed}
        `;

        div.appendChild(s);
    });

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send(){

    const msg = input.value.trim();
    if(!msg) return;

    const user = document.createElement("div");
    user.className = "msg user";
    user.textContent = msg;
    chat.appendChild(user);

    input.value = "";

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: msg,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;
    localStorage.setItem("sessionId", sessionId);

    renderBot(data);
}

</script>

</body>
</html>
