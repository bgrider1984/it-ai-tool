<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
}

/* CHAT BOX */
#chat {
    height: 70vh;
    overflow-y: auto;
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
}

/* MESSAGE BUBBLES */
.msg {
    padding: 10px 12px;
    margin: 6px 0;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
    word-wrap: break-word;
}

/* USER RIGHT SIDE */
.user {
    background: #2563eb;
    align-self: flex-end;
}

/* BOT LEFT SIDE */
.bot {
    background: #374151;
    align-self: flex-start;
}

/* INPUT AREA */
.inputArea {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    padding: 12px 18px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<div class="container">
    <h2>IT Copilot</h2>

    <div id="chat"></div>

    <div class="inputArea">
        <input id="input" placeholder="Describe your IT issue..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>

let sessionId = null;

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// FIX: Enter key support
input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        send();
    }
});

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("msg", type);
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: message,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;

    addMessage(data.response, "bot");
}

</script>

</body>
</html>
