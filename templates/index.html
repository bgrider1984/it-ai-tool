<!DOCTYPE html>
<html>
<head>
    <title>IT Troubleshooting Assistant</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 12px;
            background: #111827;
            text-align: center;
            font-weight: bold;
        }

        #chat {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        #options {
            padding: 10px;
            background: #111827;
            border-top: 1px solid #374151;
        }

        .msg {
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 75%;
            white-space: pre-wrap;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
        }

        .bot {
            background: #1f2937;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #111827;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            margin-left: 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        select {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            border-radius: 6px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<header>🛠 IT Troubleshooting Assistant</header>

<div id="chat"></div>
<div id="options"></div>

<div id="inputArea">
    <input id="msg" placeholder="Type your issue..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
let chatHistory = [];

async function sendMessage(textOverride = null) {
    const input = document.getElementById("msg");
    const text = textOverride || input.value;

    if (!text) return;

    input.value = "";

    addMessage("user", text);

    chatHistory.push({
        role: "user",
        content: text
    });

    const res = await fetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ history: chatHistory })
    });

    const data = await res.json();

    console.log("FULL RESPONSE:", data);

    addMessage("bot", data.response);

    chatHistory.push({
        role: "assistant",
        content: data.response
    });

    renderOptions(data.options || []);
}

function addMessage(role, text) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function renderOptions(options) {
    const container = document.getElementById("options");

    container.innerHTML = "";

    if (!options || options.length === 0) return;

    // ADD UNCERTAINTY OPTION
    const extendedOptions = [...options, "I am not sure"];

    const select = document.createElement("select");

    const defaultOpt = document.createElement("option");
    defaultOpt.text = "Select an option...";
    defaultOpt.value = "";
    select.appendChild(defaultOpt);

    extendedOptions.forEach(opt => {
        const option = document.createElement("option");
        option.value = opt;
        option.text = opt;
        select.appendChild(option);
    });

    select.onchange = () => {
        if (!select.value) return;

        const value = select.value;

        // Handle uncertainty explicitly
        if (value === "I am not sure") {
            sendMessage("User is unsure. Rephrase the question and explain it in simpler terms with examples.");
        } else {
            sendMessage(value);
        }

        container.innerHTML = "";
    };

    container.appendChild(select);
}
</script>

</body>
</html>
