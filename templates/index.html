<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot Workflow Engine</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

#chat {
    height:70vh;
    overflow-y:auto;
    background:#111827;
    padding:15px;
    border-radius:10px;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:8px;
}

.user {
    background:#2563eb;
}

.bot {
    background:#374151;
}

.step {
    background:#1f2937;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

button {
    margin-top:8px;
    margin-right:8px;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.run {
    background:#22c55e;
}

.pass {
    background:#3b82f6;
}

.fail {
    background:#ef4444;
}

.inputArea {
    display:flex;
    gap:10px;
    margin-top:10px;
}

input {
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
}
</style>
</head>

<body>

<div class="container">
<h2>Workflow IT Copilot</h2>

<div id="chat"></div>

<div class="inputArea">
<input id="input" placeholder="Describe issue..." />
<button onclick="send()">Send</button>
</div>
</div>

<script>

let sessionId = localStorage.getItem("sessionId");

const chat = document.getElementById("chat");
const input = document.getElementById("input");

let currentStep = null;

function addUser(text){
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = text;
    chat.appendChild(div);
}

function renderStep(step){

    const div = document.createElement("div");
    div.className = "msg bot step";

    div.innerHTML = `
        <b>${step.title}</b><br><br>
        ${step.instructions}<br><br>
        <small>${step.expected}</small><br><br>
    `;

    const run = document.createElement("button");
    run.className = "run";
    run.textContent = "Run Step";

    const pass = document.createElement("button");
    pass.className = "pass";
    pass.textContent = "Worked";

    const fail = document.createElement("button");
    fail.className = "fail";
    fail.textContent = "Failed";

    run.onclick = () => alert("Execute manually: " + step.instructions);

    pass.onclick = () => sendStep(step.id, "passed");
    fail.onclick = () => sendStep(step.id, "failed");

    div.appendChild(run);
    div.appendChild(pass);
    div.appendChild(fail);

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function sendStep(step_id, result){

    const res = await fetch("/step", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            session_id: sessionId,
            step_id,
            result
        })
    });

    const data = await res.json();

    if(data.next_step){
        renderStep(data.next_step);
    }
}

async function send(){

    const msg = input.value.trim();
    if(!msg) return;

    addUser(msg);
    input.value = "";

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: msg,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;
    localStorage.setItem("sessionId", sessionId);

    if(data.step){
        renderStep(data.step);
    }
}

</script>

</body>
</html>
