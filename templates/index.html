<!DOCTYPE html>
<html>
<head>
<title>IT Copilot Login</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.card {
    background:#111827;
    padding:20px;
    border-radius:12px;
    width:300px;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
}

button {
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>IT Copilot</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<script>
async function signup(){
    await fetch("/signup", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email: email.value,
            password: password.value
        })
    });
    alert("Account created");
}

async function login(){
    const res = await fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    if(res.ok){
        window.location.href = "/dashboard";
    } else {
        alert("Login failed");
    }
}
</script>

</body>
</html>
