<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Coach Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}

.wrapper {
    display:flex;
}

.left {
    flex:2;
    padding:20px;
}

.right {
    flex:1;
    background:#111827;
    padding:20px;
    border-left:2px solid #1f2937;
}

#chat {
    height:65vh;
    overflow-y:auto;
    background:#1f2937;
    padding:10px;
    border-radius:8px;
}

.msg {
    margin:8px 0;
    padding:8px;
    border-radius:6px;
}

.user { background:#2563eb; }
.bot { background:#374151; }

input {
    width:80%;
    padding:10px;
}

button {
    padding:10px;
    background:#22c55e;
    border:none;
    color:white;
}

.panel {
    margin-bottom:20px;
}

.small {
    font-size:12px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- LEFT SIDE -->
<div class="left">
<h2>IT Coach</h2>

<div id="chat"></div>

<input id="msg" placeholder="Ask issue..." />
<button onclick="send()">Send</button>
</div>

<!-- RIGHT DASHBOARD -->
<div class="right">
<h3>Training Dashboard</h3>

<div class="panel">
<b>Skill Score:</b> <span id="score">0</span>
</div>

<div class="panel">
<b>Weak Areas:</b>
<div id="weak">None</div>
</div>

<div class="panel">
<b>Total Messages:</b> <span id="total">0</span>
</div>
</div>

</div>

<script>

let sessionId = null;

function add(text, cls){
    let d = document.createElement("div");
    d.className = "msg " + cls;
    d.innerText = text;
    document.getElementById("chat").appendChild(d);
}

async function send(){

    let msg = document.getElementById("msg").value;
    document.getElementById("msg").value="";

    add(msg,"user");

    let res = await fetch("/ask",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg, session_id:sessionId})
    });

    let data = await res.json();

    sessionId = data.session_id;

    add(data.response,"bot");

    document.getElementById("score").innerText = data.score;
    document.getElementById("weak").innerText = (data.weak_areas || []).join(", ");
}

</script>

</body>
</html>
