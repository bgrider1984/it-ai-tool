<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
}

/* CHAT WINDOW */
#chat {
    height: 70vh;
    overflow-y: auto;
    background: #111827;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
}

/* MESSAGE BUBBLES */
.msg {
    margin: 6px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 75%;
    white-space: pre-wrap;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #374151;
    align-self: flex-start;
}

/* FIX BUTTONS */
.fix-btn {
    margin-top: 8px;
    margin-right: 6px;
    padding: 6px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 12px;
}

.high {
    background: #22c55e;
    color: black;
}

.medium {
    background: #eab308;
    color: black;
}

.low {
    background: #ef4444;
    color: white;
}

/* INPUT AREA */
.inputArea {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button.send {
    padding: 12px 16px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>IT Copilot</h2>

    <div id="chat"></div>

    <div class="inputArea">
        <input id="input" placeholder="Describe your IT issue..." />
        <button class="send" onclick="send()">Send</button>
    </div>
</div>

<script>

let sessionId = localStorage.getItem("sessionId");

const chat = document.getElementById("chat");
const input = document.getElementById("input");

/* ENTER KEY SUPPORT */
input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        send();
    }
});

/* ADD MESSAGE */
function add(text, type, fixes = []){
    const div = document.createElement("div");
    div.className = "msg " + type;

    const textNode = document.createElement("div");
    textNode.textContent = text;
    div.appendChild(textNode);

    /* FIX BUTTONS */
    fixes.forEach(fix => {
        const btn = document.createElement("button");

        btn.className = "fix-btn " + (fix.confidence || "medium").toLowerCase();
        btn.textContent = `${fix.label} (${fix.confidence})`;

        btn.onclick = () => runFix(fix.name);

        div.appendChild(btn);
    });

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

/* RUN FIX → SHOW INSTRUCTIONS */
async function runFix(fixName){

    add("Opening steps for: " + fixName, "user");

    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            run_fix: fixName,
            session_id: sessionId
        })
    });

    const data = await res.json();

    add(data.response, "bot");
}

/* SEND MESSAGE */
async function send(){

    const msg = input.value.trim();
    if(!msg) return;

    add(msg, "user");
    input.value = "";

    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            message: msg,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;
    localStorage.setItem("sessionId", sessionId);

    add(data.response, "bot", data.fixes || []);
}

</script>

</body>
</html>
