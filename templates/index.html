<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    background: #0b1220;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
}

/* CHAT */
#chat {
    height: 70vh;
    overflow-y: auto;
    background: #111827;
    border-radius: 10px;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.msg {
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #374151;
    align-self: flex-start;
}

/* INPUT */
.inputArea {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>IT Copilot</h2>

<div id="chat"></div>

<div class="inputArea">
    <input id="input" placeholder="Describe your IT issue..." />
    <button onclick="send()">Send</button>
</div>

</div>

<script>

let sessionId = localStorage.getItem("sessionId");

const chat = document.getElementById("chat");
const input = document.getElementById("input");

input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        e.preventDefault();
        send();
    }
});

function add(text, type, fix=null){
    const wrapper = document.createElement("div");
    wrapper.className = "msg " + type;

    const textDiv = document.createElement("div");
    textDiv.textContent = text;

    wrapper.appendChild(textDiv);

    // FIX BUTTON
    if(fix){
        const btn = document.createElement("button");
        btn.textContent = "Run Fix";
        btn.style.marginTop = "8px";
        btn.style.background = "#22c55e";
        btn.style.border = "none";
        btn.style.padding = "6px 10px";
        btn.style.borderRadius = "6px";
        btn.style.cursor = "pointer";

        btn.onclick = () => runFix(fix);

        wrapper.appendChild(btn);
    }

    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
}

async function runFix(fixName){

    add("Running fix: " + fixName, "user");

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: "run fix",
            session_id: sessionId
        })
    });

    const data = await res.json();

    add(data.response, "bot");
}

async function send(){

    const msg = input.value.trim();
    if(!msg) return;

    add(msg,"user");
    input.value = "";

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: msg,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;
    localStorage.setItem("sessionId", sessionId);

    add(data.response, "bot", data.fix);
}

</script>

</body>
</html>
