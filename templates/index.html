<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>IT Copilot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        #chatBox {
            background: #111827;
            padding: 15px;
            border-radius: 10px;
            height: 70vh;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user {
            background: #2563eb;
            text-align: right;
        }

        .bot {
            background: #374151;
            text-align: left;
        }

        .inputArea {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        .typing {
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>IT Copilot</h1>

    <div id="chatBox"></div>

    <div class="inputArea">
        <input id="messageInput" type="text" placeholder="Type your issue..." />
        <button id="sendButton">Send</button>
    </div>
</div>

<script>
let sessionId = null;

const chatBox = document.getElementById("chatBox");
const input = document.getElementById("messageInput");
const sendButton = document.getElementById("sendButton");

// ----------------------------
// ENTER KEY SUPPORT
// ----------------------------
input.addEventListener("keypress", function (event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

// ----------------------------
// SEND BUTTON
// ----------------------------
sendButton.addEventListener("click", sendMessage);

// ----------------------------
// ADD MESSAGE TO CHAT
// ----------------------------
function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("message");
    div.classList.add(sender);
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// ----------------------------
// SEND MESSAGE
// ----------------------------
async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    // typing indicator
    const typing = document.createElement("div");
    typing.classList.add("message", "bot", "typing");
    typing.textContent = "Thinking...";
    chatBox.appendChild(typing);
    chatBox.scrollTop = chatBox.scrollHeight;

    const res = await fetch("/ask", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;

    // remove typing
    chatBox.removeChild(typing);

    addMessage(data.response, "bot");
}
</script>

</body>
</html>
