<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tier 2 AI Copilot</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

#chat {
    height:70vh;
    overflow-y:auto;
    background:#111827;
    padding:15px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
}

.msg {
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    max-width:85%;
    white-space:pre-wrap;
}

.user {
    background:#2563eb;
    align-self:flex-end;
}

.bot {
    background:#374151;
    align-self:flex-start;
}

.step {
    margin-top:6px;
    padding:8px;
    background:#1f2937;
    border-radius:6px;
}

.inputArea {
    display:flex;
    margin-top:10px;
    gap:10px;
}

input {
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Tier 2 AI Copilot</h2>

    <div id="chat"></div>

    <div class="inputArea">
        <input id="input" placeholder="Describe issue..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>

let sessionId = localStorage.getItem("sessionId");

const chat = document.getElementById("chat");
const input = document.getElementById("input");

input.addEventListener("keydown", e => {
    if(e.key === "Enter") send();
});

function addBot(data){

    const div = document.createElement("div");
    div.className = "msg bot";

    div.innerHTML = `
        <b>Issue:</b> ${data.issue_summary}<br>
        <b>Likely Cause:</b> ${data.likely_cause}<br>
        <b>Confidence:</b> ${data.confidence}<br><br>
        <b>Steps:</b>
    `;

    data.steps.forEach(s => {
        const step = document.createElement("div");
        step.className = "step";
        step.innerHTML = `<b>${s.action}</b><br><small>${s.why}</small>`;
        div.appendChild(step);
    });

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function addUser(text){
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = text;
    chat.appendChild(div);
}

async function send(){

    const msg = input.value.trim();
    if(!msg) return;

    addUser(msg);
    input.value = "";

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: msg,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;
    localStorage.setItem("sessionId", sessionId);

    addBot(data.response);
}

</script>

</body>
</html>
