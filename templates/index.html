<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

#chat {
    height:70vh;
    overflow-y:auto;
    background:#111827;
    padding:15px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:8px;
    white-space:pre-wrap;
}

.user {
    background:#2563eb;
    align-self:flex-end;
    max-width:80%;
}

.bot {
    background:#374151;
    align-self:flex-start;
    max-width:90%;
}

.inputArea {
    display:flex;
    gap:10px;
    margin-top:10px;
}

input {
    flex:1;
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Junior IT Copilot</h2>

<div id="chat"></div>

<div class="inputArea">
<input id="input" placeholder="Describe the issue..." />
<button onclick="send()">Send</button>
</div>
</div>

<script>

let sessionId = localStorage.getItem("sessionId");

const chat = document.getElementById("chat");
const input = document.getElementById("input");

input.addEventListener("keydown", e => {
    if(e.key === "Enter") send();
});

function addUser(text){
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = text;
    chat.appendChild(div);
}

function addBot(text){
    const div = document.createElement("div");
    div.className = "msg bot";
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send(){

    const msg = input.value.trim();
    if(!msg) return;

    addUser(msg);
    input.value = "";

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: msg,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;
    localStorage.setItem("sessionId", sessionId);

    addBot(data.response);
}

</script>

</body>
</html>
