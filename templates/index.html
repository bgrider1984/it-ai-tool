<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot SaaS</title>

<style>
body {
    font-family:Arial;
    background:#0b1220;
    color:white;
    margin:0;
}

.container {
    max-width:900px;
    margin:auto;
    padding:20px;
}

input, button {
    padding:10px;
    margin:5px;
    border-radius:6px;
    border:none;
}

#chat {
    height:60vh;
    overflow-y:auto;
    background:#111827;
    padding:10px;
    border-radius:10px;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:8px;
}

.user { background:#2563eb; }
.bot { background:#374151; }

button {
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 IT Copilot SaaS</h2>

<div>
<input id="email" placeholder="email">
<input id="password" placeholder="password" type="password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<div id="chat"></div>

<input id="input" placeholder="Ask IT issue">
<button onclick="send()">Send</button>

</div>

<script>

let userId = null;
let sessionId = localStorage.getItem("sessionId");

function add(text, cls){
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    document.getElementById("chat").appendChild(d);
}

async function signup(){
    await fetch("/signup", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email: email.value,
            password: password.value
        })
    });
}

async function login(){
    const res = await fetch("/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json();
    userId = data.user_id;
}

async function send(){

    const msg = input.value;
    add(msg,"user");

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: msg,
            user_id: userId,
            session_id: sessionId
        })
    });

    const data = await res.json();

    sessionId = data.session_id;
    localStorage.setItem("sessionId", sessionId);

    add(data.response, "bot");
}

</script>

</body>
</html>
