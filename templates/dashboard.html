<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
    display:flex;
    height:100vh;
}

.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    padding:10px;
    background:#111827;
    display:flex;
    justify-content:space-between;
}

#chat {
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
}

.msg {
    display:inline-block;
    max-width:70%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
    white-space:pre-wrap;
}

.user { background:#2563eb; align-self:flex-end; }
.bot { background:#374151; align-self:flex-start; }

.input-area {
    display:flex;
    padding:10px;
    background:#111827;
}

input {
    flex:1;
    padding:10px;
    border-radius:6px;
    border:none;
}

button {
    margin-left:10px;
    padding:10px;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="main">

<div class="header">
    <div>IT Copilot</div>
    <button onclick="logout()">Logout</button>
</div>

<div id="chat"></div>

<div class="input-area">
    <input id="input" placeholder="Ask your issue...">
    <button onclick="send()">Send</button>
</div>

</div>

<script>

function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    document.getElementById("chat").appendChild(div);
}

document.addEventListener("keydown", function(e){
    if(e.key === "Enter" && document.activeElement.id === "input"){
        send();
    }
});

async function send(){

    const input = document.getElementById("input");
    const msg = input.value.trim();

    if(!msg) return;

    input.value = "";

    add(msg, "user");

    try {
        const res = await fetch("/ask", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({message: msg})
        });

        const data = await res.json();

        add(data.response || "No response received", "bot");

    } catch (err) {
        add("Network error. Please try again.", "bot");
    }
}

function logout(){
    window.location.href = "/logout";
}

</script>

</body>
</html>
