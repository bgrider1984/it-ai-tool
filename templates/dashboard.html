<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot Dashboard v2 Fixed</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
    display:flex;
    height:100vh;
}

.sidebar {
    width:280px;
    background:#111827;
    padding:15px;
    overflow-y:auto;
}

.session {
    padding:10px;
    margin:5px 0;
    background:#1f2937;
    border-radius:6px;
    cursor:pointer;
}

.session:hover {
    background:#374151;
}

.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    padding:10px;
    background:#111827;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

#chat {
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:8px;
    max-width:70%;
}

.user { background:#2563eb; margin-left:auto; }
.bot { background:#374151; }

.input-area {
    display:flex;
    padding:10px;
    background:#111827;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
}

button {
    margin-left:10px;
    padding:10px 15px;
    background:#22c55e;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Sessions</h3>
    <div id="sessions"></div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
    <div>IT Copilot</div>
    <button onclick="logout()" style="background:#ef4444;">Logout</button>
</div>

<div id="chat"></div>

<div class="input-area">
    <input id="input" placeholder="Ask IT issue...">
    <button onclick="send()">Send</button>
</div>

</div>

<script>

let currentSession = null;

/* ----------------------------
   UI HELPERS
---------------------------- */
function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

/* ----------------------------
   ENTER KEY FIX (IMPORTANT)
---------------------------- */
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("input").addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();
            send();
        }
    });
});

/* ----------------------------
   LOGOUT
---------------------------- */
function logout(){
    fetch("/logout").then(() => {
        window.location.href = "/";
    });
}

/* ----------------------------
   LOAD SESSIONS
---------------------------- */
async function loadSessions(){

    const res = await fetch("/sessions", {credentials:"include"});

    if(!res.ok) return;

    const data = await res.json();

    const container = document.getElementById("sessions");
    container.innerHTML = "";

    data.forEach(s => {
        const div = document.createElement("div");
        div.className = "session";
        div.textContent = s.title;
        div.onclick = () => loadSession(s.session_id);
        container.appendChild(div);
    });
}

/* ----------------------------
   LOAD SESSION
---------------------------- */
async function loadSession(sid){

    currentSession = sid;

    const res = await fetch("/load_session/" + sid, {
        credentials:"include"
    });

    if(!res.ok){
        add("Failed to load session", "bot");
        return;
    }

    const data = await res.json();

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach(m => {
        add(m.message, m.role === "user" ? "user" : "bot");
    });
}

/* ----------------------------
   SEND MESSAGE (FIXED ERROR HANDLING)
---------------------------- */
async function send(){

    const input = document.getElementById("input");
    const msg = input.value.trim();

    if(!msg) return;

    input.value = "";

    add(msg, "user");

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body: JSON.stringify({
            message: msg,
            session_id: currentSession
        })
    });

    if(!res.ok){
        add("Error: not logged in or server issue", "bot");
        return;
    }

    const data = await res.json();

    add(data.response, "bot");

    loadSessions();
}

/* INIT */
loadSessions();

</script>

</body>
</html>
