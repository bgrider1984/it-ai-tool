<!DOCTYPE html>
<html>
<head>
<title>IT Helpdesk Copilot</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
    display:flex;
}

.sidebar {
    width:250px;
    background:#111827;
    padding:10px;
}

.main {
    flex:1;
    padding:20px;
}

.chat {
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    height:60vh;
    overflow-y:auto;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:8px;
    word-wrap:break-word;
}

.user { background:#2563eb; }
.bot { background:#374151; }

.input-area {
    display:flex;
    margin-top:10px;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
}

button {
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#22c55e;
    color:white;
}

button:hover {
    background:#16a34a;
}

.stepbox {
    background:#111827;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Sessions</h3>
<div id="sessions"></div>
</div>

<div class="main">

<h2>IT Copilot SaaS</h2>

<div class="stepbox" id="stepbox">Step: Not started</div>

<div class="chat" id="chat"></div>

<div class="input-area">
    <input id="input" placeholder="Describe issue..." />
    <button onclick="sendMessage()">Send</button>
</div>

<div id="buttons"></div>

</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("input");

// ----------------------------
// ADD MESSAGE
// ----------------------------
function addMessage(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ----------------------------
// RENDER BUTTONS
// ----------------------------
function renderButtons(options){
    const box = document.getElementById("buttons");
    box.innerHTML = "";

    if(!options) return;

    options.forEach(opt => {
        const b = document.createElement("button");
        b.textContent = opt;

        b.onclick = () => {
            input.value = opt;
            sendMessage();
        };

        box.appendChild(b);
    });
}

// ----------------------------
// SEND MESSAGE (FIXED)
// ----------------------------
async function sendMessage(){

    const msg = input.value.trim();

    if(!msg) return;

    addMessage(msg, "user");

    input.value = ""; // FIX: clear immediately

    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: msg })
        });

        if(!res.ok){
            throw new Error("Server error: " + res.status);
        }

        const data = await res.json();

        addMessage(data.response || "No response received", "bot");

        if(data.step){
            document.getElementById("stepbox").textContent = "Step " + data.step;
        }

        renderButtons(data.options);

    } catch (err) {
        addMessage("⚠ Error contacting server. Check backend logs.", "bot");
        console.error(err);
    }
}

// ----------------------------
// ENTER KEY SUPPORT (FIXED)
// ----------------------------
input.addEventListener("keydown", function(event){
    if(event.key === "Enter"){
        event.preventDefault();
        sendMessage();
    }
});

</script>

</body>
</html>
