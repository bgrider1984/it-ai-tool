<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    display:flex;
}

.sidebar {
    width:220px;
    background:#111827;
    height:100vh;
    padding:15px;
}

.main {
    flex:1;
    padding:20px;
}

#chat {
    height:70vh;
    overflow-y:auto;
    background:#111827;
    padding:10px;
    border-radius:10px;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:8px;
    max-width:80%;
}

.user { background:#2563eb; margin-left:auto; }
.bot { background:#374151; }

.input-row {
    display:flex;
    gap:10px;
    margin-top:10px;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>IT Copilot</h2>
    <a href="/logout" style="color:white;">Logout</a>
</div>

<div class="main">

<h2>Dashboard</h2>

<div id="chat"></div>

<div class="input-row">
    <input id="input" placeholder="Ask IT issue..." />
    <button onclick="send()">Send</button>
</div>

</div>

<script>

function add(text, type){
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send(){

    const msg = document.getElementById("input").value.trim();
    if(!msg) return;

    add(msg,"user");

    document.getElementById("input").value = "";

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials: "include",
        body:JSON.stringify({message: msg})
    });

    const data = await res.json();

    add(data.response || data.error, "bot");
}

</script>

</body>
</html>
