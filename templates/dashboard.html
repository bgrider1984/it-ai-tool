<!DOCTYPE html>
<html>
<head>
<title>IT Helpdesk Copilot</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
    display:flex;
}

.sidebar {
    width:250px;
    background:#111827;
    padding:10px;
}

.main {
    flex:1;
    padding:20px;
}

.chat {
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    height:60vh;
    overflow:auto;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:8px;
}

.user { background:#2563eb; }
.bot { background:#374151; }

button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#22c55e;
    color:white;
}

.stepbox {
    background:#111827;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Sessions</h3>
<div id="sessions"></div>
</div>

<div class="main">

<h2>IT Copilot SaaS</h2>

<div class="stepbox" id="stepbox">Step: Not started</div>

<div class="chat" id="chat"></div>

<input id="input" placeholder="Describe issue..." style="width:70%;padding:10px;">
<button onclick="send()">Send</button>

<div id="buttons"></div>

</div>

<script>

function add(text, cls){
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    document.getElementById("chat").appendChild(d);
}

function renderButtons(options){
    const box = document.getElementById("buttons");
    box.innerHTML = "";
    options.forEach(o=>{
        const b = document.createElement("button");
        b.textContent = o;
        b.onclick = () => send(o);
        box.appendChild(b);
    });
}

async function send(msgOverride){

    let msg = msgOverride || document.getElementById("input").value;

    add(msg,"user");

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    });

    const data = await res.json();

    add(data.response,"bot");

    if(data.step){
        document.getElementById("stepbox").textContent = "Step " + data.step;
    }

    if(data.options){
        renderButtons(data.options);
    }
}

</script>

</body>
</html>
