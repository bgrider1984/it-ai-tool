<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
    display:flex;
    height:100vh;
}

.sidebar {
    width:280px;
    background:#111827;
    padding:10px;
}

.session {
    padding:10px;
    margin:5px 0;
    background:#1f2937;
    cursor:pointer;
}

.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#111827;
}

#chat {
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:6px;
}

.user { background:#2563eb; margin-left:auto; }
.bot { background:#374151; }

.input-area {
    display:flex;
    padding:10px;
    background:#111827;
}

input {
    flex:1;
    padding:10px;
}

button {
    margin-left:10px;
    padding:10px;
    background:#22c55e;
    border:none;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>Sessions</h3>
    <div id="sessions"></div>
</div>

<div class="main">

<div class="header">
    <div>IT Copilot</div>
    <button onclick="logout()">Logout</button>
</div>

<div id="chat"></div>

<div class="input-area">
    <input id="input" placeholder="Ask issue...">
    <button onclick="send()">Send</button>
</div>

</div>

<script>

function add(text, cls){
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    document.getElementById("chat").appendChild(d);
}

/* ENTER KEY FIX (ROBUST) */
document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        if(document.activeElement.id === "input"){
            send();
        }
    }
});

async function send(){

    const input = document.getElementById("input");
    const msg = input.value.trim();
    if(!msg) return;

    input.value = "";
    add(msg, "user");

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body: JSON.stringify({message: msg})
    });

    const data = await res.json();

    add(data.response || "No response", "bot");
}

function logout(){
    window.location.href = "/logout";
}

async function loadSessions(){
    const res = await fetch("/sessions", {credentials:"include"});
    if(!res.ok) return;

    const data = await res.json();

    const c = document.getElementById("sessions");
    c.innerHTML = "";

    data.forEach(s => {
        const d = document.createElement("div");
        d.className = "session";
        d.textContent = s.title;
        c.appendChild(d);
    });
}

loadSessions();

</script>

</body>
</html>
