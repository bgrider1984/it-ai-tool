<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IT Copilot Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
    display:flex;
    height:100vh;
}

.sidebar {
    width:280px;
    background:#111827;
    padding:15px;
    overflow-y:auto;
}

.session {
    padding:10px;
    margin:5px 0;
    background:#1f2937;
    border-radius:6px;
    cursor:pointer;
}

.session:hover {
    background:#374151;
}

.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.header {
    padding:10px;
    background:#111827;
}

#chat {
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:8px;
    max-width:70%;
}

.user { background:#2563eb; margin-left:auto; }
.bot { background:#374151; }

.input-area {
    display:flex;
    padding:10px;
    background:#111827;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
}

button {
    margin-left:10px;
    padding:10px 15px;
    background:#22c55e;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <h3>Sessions</h3>
    <div id="sessions"></div>
</div>

<div class="main">

<div class="header">
    <h3>IT Copilot</h3>
</div>

<div id="chat"></div>

<div class="input-area">
    <input id="input" placeholder="Ask IT issue...">
    <button onclick="send()">Send</button>
</div>

</div>

<script>

let currentSession = null;

function add(text, cls){
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    document.getElementById("chat").appendChild(div);
}

async function loadSessions(){

    const res = await fetch("/sessions", {credentials:"include"});
    if(!res.ok) return;

    const data = await res.json();

    const container = document.getElementById("sessions");
    container.innerHTML = "";

    data.forEach(s => {
        const div = document.createElement("div");
        div.className = "session";
        div.textContent = s.title;
        div.onclick = () => loadSession(s.session_id);
        container.appendChild(div);
    });
}

async function loadSession(sid){

    const res = await fetch("/load_session/" + sid, {
        credentials:"include"
    });

    if(!res.ok) return;

    const data = await res.json();

    const chat = document.getElementById("chat");
    chat.innerHTML = "";

    data.forEach(m => {
        add(m.message, m.role === "user" ? "user" : "bot");
    });
}

async function send(){

    const input = document.getElementById("input");
    const msg = input.value.trim();
    if(!msg) return;

    input.value = "";

    add(msg, "user");

    const res = await fetch("/ask", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body: JSON.stringify({ message: msg })
    });

    if(!res.ok){
        const err = await res.text();
        add("Server: " + err, "bot");
        return;
    }

    const data = await res.json();
    add(data.response, "bot");

    loadSessions();
}

loadSessions();

</script>

</body>
</html>
